# Example for faceliveliness.bargad.ai — merge with your Certbot / SSL blocks.
#
# Critical: proxy_pass must end with a URI path (here `/`) so nginx strips the
# `/api/` prefix. FastAPI serves `/liveness/...`, `/match`, not `/api/liveness/...`.
#
# Frontend build: set VITE_API_URL=https://faceliveliness.bargad.ai/api
# (no trailing slash; getApiBase() strips trailing slashes).

server {
    listen 8080;
    server_name faceliveliness.bargad.ai;
    root /var/www/faceliveliness/html;
    index index.html;

    client_max_body_size 80m;

    location = /api {
        return 308 /api/;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/faceliveliness.bargad.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/faceliveliness.bargad.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
